<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBYS — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
 
<div class="banner">
    <div class="logo" role="button" tabindex="0" onclick="window.location.href='index.html';">URBYS</div>
    <div class="center">
        <h1>SUSTENTABILIDADE PARA <span>TODOS</span></h1>
    </div>
</div>
    
<div class="page-wrapper">
    <div class="login-card">
        <h1 class="card-title">Bem-vindo de volta!</h1>
        <p class="card-subtitle">Entre com seu CPF e senha para continuar.</p>
 
        <form id="loginForm" novalidate>
 
            <fieldset>
                <legend>Acesso</legend>
 
                <div class="field">
                    <label for="cpf">CPF</label>
                    <div class="input-wrap">
                        <span class="icon">🪪</span>
                        <input id="cpf" type="text" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                </div>
 
                <div class="field">
                    <label for="password">Senha</label>
                    <div class="input-wrap">
                        <span class="icon">🔒</span>
                        <input id="password" type="password" placeholder="Digite sua senha" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>
 
                <div class="forgot-link">
                    <a href="#">Esqueceu sua senha?</a>
                </div>
            </fieldset>
 
            <button type="submit" class="btn-submit">Entrar</button>
        </form>
 
        <div class="register-link">
            <p>Não tem uma conta? <a href="../register/register.html">Cadastre-se</a></p>
        </div>
    </div>
</div>
 
<script src="login.js"></script>
</body>
</html>
