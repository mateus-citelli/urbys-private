<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBYS — Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

<!-- Banner idêntico ao do formulário -->
<div class="banner">
    <div class="logo" role="button" tabindex="0" onclick="window.location.href='index.html';">URBYS</div>
    <div class="center">
        <h1>SUSTENTABILIDADE PARA <span>TODOS</span></h1>
    </div>
</div>

<div class="page-wrapper">
    <div class="register-card">
        <h1 class="card-title">Cadastro de Usuário</h1>
        <p class="card-subtitle">Crie sua conta para reportar problemas na sua cidade.</p>

        <form id="registerForm" novalidate>

            <!-- Seção: Dados Pessoais -->
            <fieldset>
                <legend>Dados Pessoais</legend>

                <div class="field">
                    <label for="cpf">CPF</label>
                    <div class="input-wrap">
                        <span class="icon">🪪</span>
                        <input id="cpf" type="text" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="email">E-mail</label>
                        <div class="input-wrap">
                            <span class="icon">✉️</span>
                            <input id="email" type="email" placeholder="seu@email.com" required>
                        </div>
                    </div>
                    <div class="field">
                        <label for="phone">Telefone</label>
                        <div class="input-wrap">
                            <span class="icon">📱</span>
                            <input id="phone" type="tel" placeholder="(99) 99999-9999" maxlength="15" required>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label for="endereco">Endereço</label>
                    <div class="input-wrap">
                        <span class="icon">📍</span>
                        <input id="endereco" type="text" placeholder="Rua, número, bairro, cidade" required>
                    </div>
                </div>
            </fieldset>

            <!-- Seção: Segurança -->
            <fieldset>
                <legend>Segurança</legend>

                <div class="row">
                    <div class="field">
                        <label for="password">Senha</label>
                        <div class="input-wrap">
                            <span class="icon">🔒</span>
                            <input id="password" type="password" placeholder="Digite sua senha" required>
                            <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                        </div>
                        <div class="strength-bar"><span id="strengthBar"></span></div>
                    </div>
                    <div class="field">
                        <label for="confirm-password">Confirmar Senha</label>
                        <div class="input-wrap">
                            <span class="icon">🔒</span>
                            <input id="confirm-password" type="password" placeholder="Confirme a senha" required>
                            <span class="toggle-password" onclick="togglePassword('confirm-password')">👁️</span>
                        </div>
                    </div>
                </div>
            </fieldset>

            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>

        <div class="login-link">
            <p>Já tem uma conta? <a href="../login/login.html">Entrar</a></p>
        </div>
    </div>
</div>
<script src="register.js"></script>
</body>
</html>
