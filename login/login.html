<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>URBYS - Página de Login</title>
        <meta name="description" content="">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="login.css">
    </head>
    <body>
    <div class="container">
        <div class="login-card">
        <fieldset class="campo-login">
            <form action="fazerlogin">
                <label for="cpf" class="label-cpf">CPF</label>
                <br>
                <input type="number" id="campocpf" name="cpf" inputmode="numeric" autocomplete="on" required>
                <br>
                <label for="password" class="label-senha">SENHA</label>
                <br>
                <input type="password" id="password" name="password" autocomplete="on" required>

                <button type="submit">Enviar</button>

            </form>
            </fieldset>
        </div>
        <div class="info-card">
            <img src="resources/img/pexels-shvetsa-5029853.jpg" alt="pessoas segurando terra com uma planta nascendo dela">
        </div>
        <div class="footer">
        <footer>

        </footer>
        </div>
        </div>
        <script src="" async defer></script>
    </body>
</html>
