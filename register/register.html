<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBYS CADASTRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>

<body>
    <div class="Informacoes-cadastro">
        <form class="cadastro-card">
            <h2 class="titulo">Cadastro de usuário</h2>

            <fieldset>
                <div class="row">
                    <div class="field">
                        <label for="cpf">CPF</label>
                        <input id="cpf" type="text" placeholder="Digite seu CPF" required>
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" placeholder="Digite seu e-mail" required>
                    </div>

                    <div class="field">
                        <label for="phone">Telefone</label>
                        <input id="phone" type="tel" placeholder="Digite seu telefone" required>
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="endereco">Endereço</label>
                        <input id="endereco" type="text" placeholder="Digite seu endereço" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <div class="row">
                    <div class="field">
                        <label for="password">Senha</label>
                        <input id="password" type="password" placeholder="Digite sua senha" required>
                    </div>

                    <div class="field">
                        <label for="confirm-password">Confirmar senha</label>
                        <input id="confirm-password" type="password" placeholder="Confirme sua senha" required>
                    </div>
                </div>

                <button type="submit" id="confirmBt">Cadastrar</button>

            </fieldset>

            <div class="login-link">
                <a href="../login/login.html">já tem uma conta? Entrar</a> <!-- Futuro link para a página de login -->
            </div>
        </form>
    </div>


    <script type="module" src="../scripts/pages/register.js"></script> <!-- Futuro script da página -->
</body>

</html>
